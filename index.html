<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="../img/icono.ico">
    <title>AdopTec | ITM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<body>

    <header class="header">
        <div class="header__logo">
            <img src="img/logo.jpg" alt="Logo AdopTec" class="logo-img">
            <span class="header__title">AdopTec</span>
        </div>
    </header>

    <main class="container">
        <div class="main-layout">

            <div class="layout-image">
                <img src="img/alumno.png" alt="Tec alumno" class="img-principal">
            </div>

            <div class="layout-text">

                    <h1 class="hero__title">Adopta un amigo en el Tec</h1>
                    <p class="hero__subtitle">Comunidad oficial del ITM para rescate y adopción responsable.</p>

                    <div class="hero__actions">
                        <a href="pages/login.html" class="btn btn--primary">
                            <i class='bx bx-log-in-circle'></i> Iniciar Sesión

                        <a href="pages/nosotros.html" class="btn btn--outline">
                            Conocer Proyecto

    </main>
      <footer class="footer-bottom">
          <p>&copy; 2026 AdopTec ITM. Todos los derechos reservados.</p>
        
         <div class="validator-badges">
            <a href="https://validator.w3.org/check?uri=referer" target="_blank" title="Validar HTML">
                <img src="https://www.w3.org/Icons/valid-html40" alt="HTML Válido">

            <a href="https://jigsaw.w3.org/css-validator/check/referer" target="_blank" title="Validar CSS">
