<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | AdopTec</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <nav class="nav-bar">
        <a href="../index.html" class="nav-bar__back"><i class='bx bx-arrow-back'></i> Inicio</a>
    </nav>

    <main class="contact-section">
        <h1 class="contact-section__title">Hablemos</h1>
        
        <ul class="contact-list">
            <li class="contact-list__item">
                <i class='bx bx-map'></i> Edificio de Sistemas, ITM
            </li>
            <li class="contact-list__item">
                <i class='bx bx-envelope'></i> contacto@adoptec.itm.mx
            </li>
        </ul>

        <form class="contact-form">
            <div class="form-group">
                <label class="form-group__label">Asunto</label>
                <select class="form-group__select">
                    <option>Reportar animal herido</option>
                    <option>Problema con la plataforma</option>
                    <option>Propuesta de colaboración</option>
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-group__label">Mensaje</label>
                <textarea class="form-group__textarea" rows="4"></textarea>
            </div>

            <button type="submit" class="contact-form__btn">Enviar Mensaje</button>
        </form>
    </main>
</body>
</html>
