<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="../img/icono.ico">
    <title>Gestión de Reporte | AdopTec</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/forms.css">
</head>

<body>

    <nav class="nav-bar">
        <a href="perfil.html" class="nav-bar__back"><i class='bx bx-arrow-back'></i> Volver al Perfil</a>
        <h2 class="nav-bar__title">Publicar Reporte</h2>
    </nav>

    <main class="container" style="max-width: 600px; padding-top: 2rem;">

        <div class="card">
            <h2 class="card__title mb-4"><i class='bx bx-edit'></i> Detalles de la Mascota</h2>

            <form action="feed.html">
                <div class="form-group">
                    <label class="form-label">Nombre de la Mascota (Opcional)</label>
                    <input type="text" class="form-input" placeholder="Ej: Firulais">
                </div>

                <div class="form-group">
                    <label class="form-label">Especie</label>
                    <select class="form-input">
                        <option>Perro</option>
                        <option>Gato</option>
                        <option>Otro</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Ubicación de avistamiento</label>
                    <input type="text" class="form-input" placeholder="Ej: Atrás del Edificio K" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Descripción o Necesidades Médicas</label>
                    <textarea class="form-input" rows="4" placeholder="Describe el estado del animal..."
                        required></textarea>
                </div>

                <div class="form-group">
                    <label class="form-label">Subir Fotografía</label>
                    <input type="file" class="form-input" style="background: white;">
                </div>

                <hr style="margin: 2rem 0; border: 0; border-top: 1px solid var(--border-color);">

                <div style="display: flex; gap: 1rem; flex-direction: column;">
                    <button type="submit" class="btn btn--primary">
                        <i class='bx bx-check-circle'></i> Guardar / Publicar Alta
                    </button>
                    <button type="button" class="btn btn--danger">
                        <i class='bx bx-trash'></i> Eliminar Reporte
                    </button>
                </div>
            </form>
        </div>

    </main>

</body>

</html>
