<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="../img/icono.ico">
    <title>Mi Perfil | AdopTec</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>
    <nav class="nav-bar">
        <h2 class="nav-bar__title">Mi Perfil</h2>
    </nav>

    <main class="profile container">
        <header class="profile-header">
            <div class="profile-header__avatar mb-3">
                <i class='bx bx-user'></i>
            </div>
            <h2 class="profile-header__name">Pony Estudiante</h2>
            <p class="profile-header__career text-muted">Ing. Sistemas Computacionales</p>
        </header>

        <div class="stats">
            <div class="stats__item">
                <span class="stats__number">2</span>
                <span class="stats__label">Rescates</span>
            </div>
            <div class="stats__item">
                <span class="stats__number">5</span>
                <span class="stats__label">Donaciones</span>
            </div>
        </div>

        <div class="profile-menu">
            <a href="donaciones.html" class="profile-menu__link">
                <i class='bx bx-heart text-primary' style="font-size: 1.2rem;"></i> Mis Donaciones
            </a>
            <a href="#" class="profile-menu__link">
                <i class='bx bx-cog text-primary' style="font-size: 1.2rem;"></i> Configuración
            </a>
            <a href="../index.html" class="profile-menu__link profile-menu__link--danger">
                <i class='bx bx-log-out' style="font-size: 1.2rem;"></i> Cerrar Sesión
            </a>
        </div>
        <form action="formulario-mascota.html" style="margin: 2rem 0; text-align: center;">
            <button type="submit" class="btn-primary btn-reporte-full" style="justify-content: center;">
                <i class='bx bx-plus-circle'></i> Publicar Ayuda / Reporte
            </button>
        </form>

        <h3 class="profile-subtitle">
            <i class='bx bx-list-ul'></i> Mis Publicaciones
        </h3>
    </main>

    <nav class="bottom-nav">
        <a href="feed.html" class="nav-item">
            <i class='bx bx-home-alt-2'></i> Feed
        </a>
        <a href="donaciones.html" class="nav-item">
            <i class='bx bx-donate-heart'></i> Donar
        </a>
        <a href="perfil.html" class="nav-item nav-item--active">
            <i class='bx bx-user'></i> Perfil
        </a>
    </nav>


</body>

</html>
