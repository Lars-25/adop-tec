<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil | AdopTec</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <nav class="nav-bar">
        <a href="feed.html" class="nav-bar__back"><i class='bx bx-arrow-back'></i> Feed</a>
        <span class="nav-bar__title">Mi Perfil</span>
    </nav>

    <main class="profile">
        <header class="profile-header">
            <div class="profile-header__avatar">
                <i class='bx bx-user'></i>
            </div>
            <h2 class="profile-header__name">Pony Estudiante</h2>
            <p class="profile-header__career">Ing. Sistemas Computacionales</p>
        </header>

        <section class="stats">
            <div class="stats__item">
                <span class="stats__number">2</span>
                <span class="stats__label">Rescates</span>
            </div>
            <div class="stats__item">
                <span class="stats__number">5</span>
                <span class="stats__label">Donaciones</span>
            </div>
        </section>

        <div class="profile-menu">
            <a href="donaciones.html" class="profile-menu__link">
                <i class='bx bx-heart'></i> Mis Donaciones
            </a>
            <a href="#" class="profile-menu__link">
                <i class='bx bx-cog'></i> Configuración
            </a>
            <a href="../index.html" class="profile-menu__link profile-menu__link--danger">
                <i class='bx bx-log-out'></i> Cerrar Sesión
            </a>
        </div>
    </main>
</body>
</html>
